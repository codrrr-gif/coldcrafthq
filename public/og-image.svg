<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#08090A"/>

  <!-- Radial glow behind wordmark -->
  <radialGradient id="glow" cx="50%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="600" cy="290" rx="480" ry="220" fill="url(#glow)"/>

  <!-- Wordmark: "Cold" in Instrument Serif italic, "Craft" in Satoshi bold blue -->
  <text
    x="600"
    y="300"
    text-anchor="middle"
    font-family="'Instrument Serif', 'Playfair Display', Georgia, serif"
    font-style="italic"
    font-weight="400"
    font-size="80"
    fill="#EDEEF0"
    letter-spacing="-1"
  >Cold</text>
  <text
    x="600"
    y="300"
    text-anchor="start"
    font-family="'Satoshi', 'General Sans', system-ui, sans-serif"
    font-weight="700"
    font-size="80"
    fill="#3B82F6"
    letter-spacing="-2"
  >Craft</text>

  <!-- Tagline -->
  <text
    x="600"
    y="360"
    text-anchor="middle"
    font-family="'Satoshi', 'General Sans', system-ui, sans-serif"
    font-weight="400"
    font-size="20"
    fill="#8B8D98"
    letter-spacing="0"
  >Cold email systems that book B2B meetings</text>
</svg>
