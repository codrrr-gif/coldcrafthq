<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    ColdCraft HQ — Logo Mark
    A geometric C built from a precise 270° arc.
    Square caps for an engineered, systematic feel.
    Blue terminal accent at the opening — the "cursor" or target point.
    Works on dark backgrounds. See logo-light.svg for light backgrounds.
  -->

  <!-- The C arc: center (24,24), radius 14.14, opens at 45° angles -->
  <path
    d="M 34 14 A 14.14 14.14 0 1 0 34 34"
    stroke="#EDEEF0"
    stroke-width="3.5"
    stroke-linecap="square"
    fill="none"
  />

  <!-- Blue accent square — replaces the bottom terminal cap -->
  <rect x="31.25" y="31.25" width="5.5" height="5.5" fill="#3B82F6"/>
</svg>
